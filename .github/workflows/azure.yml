name: Deploy to Azure Container Apps

on:
  push:
    branches: azure/deploy

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: IERG4210

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Check changed files
      id: changes
      run: |
        git fetch origin ${{ github.event.before }} ${{ github.sha }}
        if git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- . | grep -q '^web/'; then
          echo "WEB=true" >> $GITHUB_OUTPUT
        fi
        if git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- . | grep -q '^api/'; then
          echo "API=true" >> $GITHUB_OUTPUT
        fi

    - name: Azure Login
      uses: Azure/login@v2.3.0
      if: steps.changes.outputs.WEB == 'true' || steps.changes.outputs.API == 'true'
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: ACR authentication
      if: steps.changes.outputs.WEB == 'true' || steps.changes.outputs.API == 'true'
      run: az acr login --name ${{ vars.REGISTRY_URL }}

    - name: Build and Push API Image
      if: steps.changes.outputs.WEB == 'true' || steps.changes.outputs.API == 'true'
      run: |
        docker pull ${{ vars.REGISTRY_URL }}/api:latest || true
        docker build \
          --target api \
          --cache-from ${{ vars.REGISTRY_URL }}/api:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t ${{ vars.REGISTRY_URL }}/api:${{ github.sha }} \
          -t ${{ vars.REGISTRY_URL }}/api:latest .
        docker push ${{ vars.REGISTRY_URL }}/api:${{ github.sha }}
        docker push ${{ vars.REGISTRY_URL }}/api:latest
    - name: Build and Push Web Image
      if: steps.changes.outputs.WEB == 'true'
      run: |
        docker build \
          --target web \
          --cache-from ${{ vars.REGISTRY_URL }}/api:latest \
          -t ${{ vars.REGISTRY_URL }}/web:${{ github.sha }} .
        docker push ${{ vars.REGISTRY_URL }}/web:${{ github.sha }}

    - name: Deploy to Web Container App
      if: steps.changes.outputs.WEB == 'true'
      run: |
        az containerapp update \
          --name ${{ vars.APP_NAME }} \
          --resource-group ${{ vars.RESOURCE_GROUP }} \
          --container-name web \
          --image ${{ vars.REGISTRY_URL }}/web:${{ github.sha }} \
          > /dev/null
    - name: Deploy to API Container App
      if: steps.changes.outputs.API == 'true'
      run: |
        az containerapp update \
          --name ${{ vars.APP_NAME }} \
          --resource-group ${{ vars.RESOURCE_GROUP }} \
          --container-name api \
          --image ${{ vars.REGISTRY_URL }}/api:${{ github.sha }} \
          > /dev/null

